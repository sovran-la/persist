name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Full test suite on native platforms
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features --verbose

      - name: Run tests
        run: cargo test --all-features --verbose

  # ---------------------------------------------------------------------------
  # Feature matrix — verify feature gating compiles and tests pass
  # ---------------------------------------------------------------------------
  features:
    name: Features (${{ matrix.features || 'none' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "json"
          - "toml"
          - "serde"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build ${{ matrix.features && format('--features {0}', matrix.features) }} --verbose

      - name: Test
        run: cargo test ${{ matrix.features && format('--features {0}', matrix.features) }} --verbose

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Cross-compile checks (platforms we can't run tests on)
  # ---------------------------------------------------------------------------
  cross-check:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - wasm32-unknown-unknown

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --target ${{ matrix.target }}

      - name: Check compilation (tests)
        run: cargo check --tests --target ${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # iOS cross-compile (needs macOS runner for Apple SDK)
  # ---------------------------------------------------------------------------
  ios-check:
    name: Cross-compile (aarch64-apple-ios)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --target aarch64-apple-ios

  # ---------------------------------------------------------------------------
  # WASM tests (browser-based via wasm-pack)
  # ---------------------------------------------------------------------------
  wasm-test:
    name: WASM tests (Chrome)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Run WASM tests (headless Chrome)
        run: wasm-pack test --headless --chrome
